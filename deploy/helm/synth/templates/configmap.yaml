apiVersion: v1
kind: ConfigMap
metadata:
  name: synth-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "synth.labels" . | nindent 4 }}
data:
  synth.toml: |
    [coordinator]
    url = "{{ .Values.config.coordinator.url }}"
    {{- if .Values.config.coordinator.adminUrl }}
    admin_url = "{{ .Values.config.coordinator.adminUrl }}"
    {{- end }}

    [oracle]
    url = "{{ .Values.config.oracle.url }}"

    [server]
    host = "{{ .Values.config.server.host }}"
    port = {{ .Values.config.server.port }}

    [db]
    path = "/data/synth.db"

    [scheduler]
    enabled = {{ .Values.config.scheduler.enabled }}
    interval_secs = {{ .Values.config.scheduler.intervalSecs }}
    scenario = "{{ .Values.config.scheduler.scenario }}"

    [defaults]
    users = {{ .Values.config.defaults.users }}
    stations = [{{ range $i, $s := .Values.config.defaults.stations }}{{ if $i }}, {{ end }}"{{ $s }}"{{ end }}]
    entry_fee = {{ .Values.config.defaults.entryFee }}
    entry_window_secs = {{ .Values.config.defaults.entryWindowSecs }}
    observation_window_secs = {{ .Values.config.defaults.observationWindowSecs }}
    signing_delay_secs = {{ .Values.config.defaults.signingDelaySecs }}
---
{{- if .Values.litestream.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: synth-litestream
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "synth.labels" . | nindent 4 }}
data:
  litestream.yml: |
    dbs:
      - path: /data/synth.db
        replicas:
          - type: s3
            bucket: {{ .Values.litestream.s3Bucket }}
            path: {{ .Values.litestream.s3Path }}
            region: {{ .Values.litestream.s3Region }}
            {{- if .Values.litestream.s3Endpoint }}
            endpoint: {{ .Values.litestream.s3Endpoint }}
            force-path-style: {{ .Values.litestream.s3ForcePathStyle }}
            {{- end }}
            {{- if .Values.litestream.encryptionKeySecret.enabled }}
            encryption-key: $LITESTREAM_ENCRYPTION_KEY
            {{- end }}
            sync-interval: {{ .Values.litestream.syncInterval }}
            retention: {{ .Values.litestream.retention }}
            snapshot-interval: {{ .Values.litestream.snapshotInterval }}
            retention-check-interval: {{ .Values.litestream.retentionCheckInterval }}
{{- end }}
