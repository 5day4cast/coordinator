{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "synth.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "synth.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
