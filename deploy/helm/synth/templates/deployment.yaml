apiVersion: apps/v1
kind: Deployment
metadata:
  name: synth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "synth.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "synth.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "synth.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "synth.serviceAccountName" . }}
      {{- if .Values.litestream.enabled }}
      initContainers:
        - name: litestream-restore
          image: "{{ .Values.litestream.image.repository }}:{{ .Values.litestream.image.tag }}"
          command:
            - sh
            - -c
            - |
              echo "Restoring database from S3 backup..."
              litestream restore -if-db-not-exists -if-replica-exists -config /etc/litestream.yml /data/synth.db || echo "No backup found, starting fresh"
              echo "Restore complete"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
          env:
            {{- if .Values.litestream.s3Endpoint }}
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
            {{- else if not .Values.litestream.useIAMRole }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: synth-s3
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: synth-s3
                  key: secret-access-key
            {{- end }}
            {{- if .Values.litestream.encryptionKeySecret.enabled }}
            - name: LITESTREAM_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.litestream.encryptionKeySecret.name }}
                  key: {{ .Values.litestream.encryptionKeySecret.key }}
            {{- end }}
      {{- end }}
      containers:
        - name: synth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["synth"]
          args: ["/config/synth.toml"]
          ports:
            - name: http
              containerPort: {{ .Values.config.server.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.litestream.enabled }}
        - name: litestream
          image: "{{ .Values.litestream.image.repository }}:{{ .Values.litestream.image.tag }}"
          args:
            - replicate
            - -config
            - /etc/litestream.yml
          volumeMounts:
            - name: data
              mountPath: /data
            - name: litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
          env:
            {{- if .Values.litestream.s3Endpoint }}
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
            {{- else if not .Values.litestream.useIAMRole }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: synth-s3
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: synth-s3
                  key: secret-access-key
            {{- end }}
            {{- if .Values.litestream.encryptionKeySecret.enabled }}
            - name: LITESTREAM_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.litestream.encryptionKeySecret.name }}
                  key: {{ .Values.litestream.encryptionKeySecret.key }}
            {{- end }}
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 128Mi
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: synth-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: synth-data
        {{- end }}
        {{- if .Values.litestream.enabled }}
        - name: litestream-config
          configMap:
            name: synth-litestream
        {{- end }}
